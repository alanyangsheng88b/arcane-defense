<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥术防御 - 经典白墨版</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #1d4ed8;
            --border: #cbd5e1;
            --exp-color: #10b981;
            --hp-color: #ef4444;
            --btn-neutral: #e2e8f0;
            --btn-neutral-hover: #cbd5e1;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; color: var(--text-main);
        }

        #game-container {
            display: flex; flex-direction: row; gap: 20px;
            background: var(--panel-bg); padding: 20px;
            border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            max-width: 98vw; height: 95vh;
            border: 1px solid var(--border); box-sizing: border-box;
        }

        #canvas-wrapper {
            position: relative; width: 440px; height: 100%; min-height: 680px;
            background-color: #ffffff; border: 2px solid var(--text-main);
            border-radius: 12px; overflow: hidden;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }

        canvas { display: block; width: 100%; height: 100%; object-fit: contain; }

        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 14px;
            box-sizing: border-box; pointer-events: none; z-index: 10;
            background: linear-gradient(to bottom, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 100%);
        }

        .bar-container {
            width: 100%; height: 8px; background: #e2e8f0;
            border-radius: 9999px; margin-bottom: 6px; overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        #exp-bar { height: 100%; background: var(--exp-color); width: 0%; transition: width 0.2s ease-out; }
        #hp-bar { height: 100%; background: var(--hp-color); width: 100%; transition: width 0.2s ease-out; }
        
        #hud-text {
            display: flex; justify-content: space-between; font-size: 13px; font-weight: 700;
            color: var(--text-main); margin-top: 2px;
        }

        #control-panel {
            width: 340px; display: flex; flex-direction: column; gap: 14px;
            overflow-y: auto; padding-right: 6px;
        }
        
        #control-panel::-webkit-scrollbar { width: 6px; }
        #control-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .panel-section {
            background: #f8fafc; padding: 14px;
            border-radius: 10px; border: 1px solid var(--border);
        }

        h3 { 
            margin-top: 0; margin-bottom: 10px; font-size: 14px; font-weight: 700;
            color: var(--text-main); border-left: 4px solid var(--text-main); padding-left: 8px;
        }

        .control-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; font-size: 12px; color: var(--text-muted); }
        .control-row-header { display: flex; justify-content: space-between; align-items: center; }
        .control-row-header span { font-weight: 600; color: var(--text-main); }
        .control-row-header span.value { color: var(--accent); font-weight: 700; }
        
        input[type=range] { width: 100%; accent-color: var(--text-main); background: #cbd5e1; height: 5px; border-radius: 3px; outline: none; border: none; }
        
        .file-upload-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 11px;}
        .file-upload-row input[type=file] { width: 150px; font-size: 11px; color: var(--text-muted);}
        .file-upload-row input[type=file]::file-selector-button {
            padding: 3px 6px; border-radius: 4px; border: 1px solid var(--border);
            background: var(--btn-neutral); color: var(--text-main); cursor: pointer; transition: 0.2s;
        }
        .file-upload-row input[type=file]::file-selector-button:hover { background: var(--btn-neutral-hover); }

        .btn-group { display: flex; gap: 8px; margin-top: 8px; }
        button {
            flex: 1; padding: 8px 0; border: 1.5px solid var(--text-main); border-radius: 6px;
            background: #ffffff; color: var(--text-main); font-weight: 700; font-size: 12px;
            cursor: pointer; transition: all 0.2s;
        }
        button:hover { background: var(--btn-neutral); }
        button.primary { background: var(--text-main); color: #ffffff; }
        button.primary:hover { opacity: 0.9; }

        #skill-status { display: flex; flex-wrap: wrap; gap: 6px; font-size: 11px; }
        .skill-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: #f1f5f9; border: 1.5px solid var(--text-main);
            padding: 3px 8px; border-radius: 6px; color: var(--text-main); font-weight: 600;
        }
        .skill-badge img { width: 12px; height: 12px; object-fit: contain; }

        #modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); display: none; justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(2px);
        }

        #level-up-modal { display: flex; flex-direction: column; gap: 10px; padding: 20px; width: 90%; }
        .skill-card {
            background: #ffffff; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; border: 2px solid var(--text-main); transition: all 0.15s ease; box-shadow: 2px 2px 0px var(--text-main);
        }
        .skill-card:hover { transform: translate(1px, 1px); box-shadow: 1px 1px 0px var(--text-main); }
        .skill-icon {
            width: 40px; height: 40px; background: #f8fafc; border-radius: 6px; border: 1.5px solid var(--text-main);
            display: flex; justify-content: center; align-items: center; font-size: 18px; flex-shrink: 0; overflow: hidden;
        }
        .skill-icon img { width: 100%; height: 100%; object-fit: contain; }
        .skill-info { display: flex; flex-direction: column; gap: 1px; flex-grow: 1; }
        .skill-name { font-weight: bold; font-size: 13px; color: var(--text-main); }
        .skill-desc { font-size: 11px; color: var(--text-muted); }
        .skill-lv { font-size: 11px; color: var(--exp-color); font-weight: bold; text-align: right; white-space: nowrap; }

        #message-layer {
            position: absolute; top: 45%; width: 100%; text-align: center;
            font-size: 28px; font-weight: 900; color: var(--text-main);
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 50;
        }

        @media (max-width: 900px) {
            #game-container { flex-direction: column; align-items: center; overflow-y: auto; height: 100vh; max-height: 100vh; padding: 8px;}
            #canvas-wrapper { min-height: 55vh; width: 100%; max-width: 440px;}
            #control-panel { width: 100%; max-width: 440px; padding-right: 0;}
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 左侧主游戏画布 -->
    <div id="canvas-wrapper">
        <canvas id="gameCanvas" width="440" height="680"></canvas>
        <div id="hud">
            <div class="bar-container"><div id="exp-bar"></div></div>
            <div class="bar-container"><div id="hp-bar"></div></div>
            <div id="hud-text">
                <span id="level-text">第 1 关</span>
                <span id="score-text">击杀: 0</span>
                <span id="time-text">00:00</span>
            </div>
        </div>
        
        <div id="modal-overlay">
            <div id="level-up-modal"></div>
        </div>
        <div id="message-layer">游戏结束</div>
    </div>

    <!-- 右侧简易控制面板 -->
    <div id="control-panel">
        <div class="panel-section">
            <h3>控制台 (Admin Panel)</h3>
            <div class="control-row">
                <div class="control-row-header"><span>游戏运行速度</span><span id="val-speed" class="value">1.0x</span></div>
                <input type="range" id="slider-speed" min="0.5" max="3" step="0.1" value="1.0">
            </div>
            <div class="control-row">
                <div class="control-row-header"><span>敌人刷新频率</span><span id="val-spawn" class="value">1.0x</span></div>
                <input type="range" id="slider-spawn" min="0.2" max="3" step="0.1" value="1.0">
            </div>
            <div class="control-row">
                <div class="control-row-header"><span>怪物移动速度</span><span id="val-mspeed" class="value">1.0x</span></div>
                <input type="range" id="slider-mspeed" min="0.2" max="3" step="0.1" value="1.0">
            </div>
            <div class="control-row">
                <div class="control-row-header"><span>怪物血量倍率</span><span id="val-mhp" class="value">1.0x</span></div>
                <input type="range" id="slider-mhp" min="0.5" max="5" step="0.5" value="1.0">
            </div>
            <div class="control-row">
                <div class="control-row-header"><span>国王初始伤害</span><span id="val-atk" class="value">10</span></div>
                <input type="range" id="slider-atk" min="5" max="100" step="5" value="10">
            </div>
            <div class="btn-group">
                <button id="btn-start" class="primary">开始</button>
                <button id="btn-pause">暂停</button>
                <button id="btn-reset">重置</button>
            </div>
        </div>

        <div class="panel-section">
            <h3>自定义外观 (Custom Assets)</h3>
            <div class="control-row" style="margin-bottom: 4px;">
                <div class="control-row-header"><span>抠图容差 (剔除亮度)</span><span id="val-chroma" class="value">210</span></div>
                <input type="range" id="slider-chroma" min="150" max="250" step="1" value="210">
            </div>
            <div class="file-upload-row">
                <span>上传国王图标:</span>
                <input type="file" accept="image/*" onchange="AssetEngine.processFile(this, 'king')">
            </div>
            <div class="file-upload-row">
                <span>上传普通怪物:</span>
                <input type="file" accept="image/*" onchange="AssetEngine.processFile(this, 'enemy0')">
            </div>
            <div class="file-upload-row">
                <span>上传奥术技能:</span>
                <input type="file" accept="image/*" onchange="AssetEngine.processFile(this, 'skillArcane')">
            </div>
            <div class="file-upload-row">
                <span>上传火球技能:</span>
                <input type="file" accept="image/*" onchange="AssetEngine.processFile(this, 'skillFireball')">
            </div>
            <div style="font-size: 11px; color: var(--text-muted); margin-top: 8px; line-height: 1.4;">
                💡 <b>提示：</b>若放置在 GitHub 仓库中，可在同级目录下直接命名并放置图片（支持自动载入抠图）：
                <br>• 国王：<code>king.png</code> 
                <br>• 怪物：<code>enemy.png</code>
                <br>• 奥术：<code>arcane.png</code>
                <br>• 火球：<code>fireball.png</code>
            </div>
        </div>

        <div class="panel-section" style="flex-grow: 1;">
            <h3>实时技能树</h3>
            <div id="skill-status">等待战斗爆发升级...</div>
        </div>
    </div>
</div>

<script>
/**
 * 严谨白墨版塔防
 */

// --- 强化抠图处理引擎 (重点重构简笔画自适应强化) ---
const AssetEngine = {
    images: {
        king: null, enemy0: null, enemy1: null, enemy2: null,
        skillArcane: null, skillFireball: null
    },
    chromaThreshold: 210, // 低于此灰度值的深色像素将被强势保护

    // 自动扫描同目录下的默认预设图片
    initDefaults() {
        const defaults = {
            king: 'king.png',
            enemy0: 'enemy.png',
            skillArcane: 'arcane.png',
            skillFireball: 'fireball.png'
        };
        for (let key in defaults) {
            const img = new Image();
            img.onload = () => {
                this.removeBackground(img, key);
            };
            img.onerror = () => {
                // 如果图片未在同目录下找到，不崩溃，正常使用默认简笔线绘效果
            };
            img.src = defaults[key];
        }
    },

    processFile(inputElement, key) {
        const file = inputElement.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => this.removeBackground(img, key);
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    },

    removeBackground(img, key) {
        const cvs = document.createElement('canvas');
        const ctx = cvs.getContext('2d');
        cvs.width = img.width; cvs.height = img.height;
        ctx.drawImage(img, 0, 0);
        
        try {
            const imgData = ctx.getImageData(0, 0, cvs.width, cvs.height);
            const data = imgData.data;
            const threshold = this.chromaThreshold;
            
            for(let i=0; i<data.length; i+=4) {
                let r = data[i], g = data[i+1], b = data[i+2];
                
                // 计算像素亮度 (灰度公式)
                let brightness = 0.299 * r + 0.587 * g + 0.114 * b;
                
                if(brightness >= threshold) {
                    // 如果是白色或高亮背景，强制设为全透明
                    data[i+3] = 0; 
                } else {
                    // 如果是深色线条（简笔画核心），强制调暗对比度，确保在浅色背景上极易辨识
                    let scale = 0.7; // 增强黑线饱和度
                    data[i] = Math.max(0, r * scale);
                    data[i+1] = Math.max(0, g * scale);
                    data[i+2] = Math.max(0, b * scale);
                    data[i+3] = 255; // 确保完全不透明
                }
            }
            ctx.putImageData(imgData, 0, 0);
            
            const finalImg = new Image();
            finalImg.src = cvs.toDataURL();
            this.images[key] = finalImg;
        } catch (e) {
            // 防崩溃沙箱：当在本地 file:// 协议运行时，Canvas 访问像素会受跨域安全限制。
            // 此时直接使用原图，避免报错卡死，并发出警告提示。
            console.warn("由于浏览器沙箱安全限制，无法进行抠图处理（这通常发生在本地直接双击打开 HTML 时）。部署到服务器/GitHub Pages 后功能将完全正常：", e);
            this.images[key] = img;
        }
        
        if(key === 'enemy0') {
            if(!this.images.enemy1) this.images.enemy1 = this.images[key];
            if(!this.images.enemy2) this.images.enemy2 = this.images[key];
        }

        UI.updateSkillPanel();
    }
};

// --- 配置参数 ---
const C = {
    W: 440, H: 680,
    PLAYER_RADIUS: 20,
    PLAYER_Y: 610, // 底部安全距离
    MAX_LEVEL: 20
};

// 技能树配置
const SKILL_DB = {
    atkSpeed: { id: 'atkSpeed', name: '急速攻速', icon: '⚡', category: 'skillArcane', maxLv: 3, descs: ['攻击速度提升 20%', '攻击速度提升 40%', '攻击速度提升 60%'] },
    textPierce: { id: 'pierce', name: '穿透强化', icon: '➶', category: 'skillArcane', maxLv: 3, descs: ['可穿透 1 个目标', '可穿透 2 个目标', '可以无限穿透敌人'] },
    explosion: { id: 'explosion', name: '爆炸强化', icon: '💥', category: 'skillArcane', maxLv: 3, descs: ['小型范围伤害 (50%)', '爆炸范围倍增 (75%)', '巨大爆炸半径并附加击退'] },
    bounce: { id: 'bounce', name: '边缘弹射', icon: '⤡', category: 'skillArcane', maxLv: 3, descs: ['反弹 1 次寻找新目标', '反弹 2 次优先锁定残血', '反弹 3 次且伤害无衰减'] },
    split: { id: 'split', name: '多重分裂', icon: '⎚', category: 'skillArcane', maxLv: 3, descs: ['命中分裂 1 枚碎弹', '命中分裂 2 枚子飞弹', '分裂 3 枚继承强化的子飞弹'] },
    volley: { id: 'volley', name: '连射强化', icon: '⇈', category: 'skillArcane', maxLv: 3, descs: ['每次额外发射 1 枚飞弹', '每次额外发射 2 枚飞弹', '每次额外发射 3 枚散射飞弹'] },
    damage: { id: 'damage', name: '奥术增幅', icon: '⚔️', category: 'skillArcane', maxLv: 3, descs: ['基础攻击力提升 20%', '伤害提升 40%，对精英+10%', '伤害提升 60%，对精英/Boss特攻'] },
    slow: { id: 'slow', name: '冰霜减速', icon: '❄️', category: 'skillArcane', maxLv: 3, descs: ['减速 20%，持续 1 秒', '减速 35%，持续 2 秒', '减速 50% 并附加 15% 易伤'] },
    fireball: { id: 'fireball', name: '学习火球术', icon: '🔥', category: 'skillFireball', maxLv: 3, descs: ['解锁爆裂火球', '强化火球爆炸半径与伤害', '火球充能极大加速'] }
};

const MathUtil = {
    dist: (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y),
    rand: (min, max) => Math.random() * (max - min) + min,
    normalize: (vx, vy) => { let len = Math.hypot(vx, vy); return len===0 ? {x:0, y:0} : {x: vx/len, y: vy/len}; }
};

// --- 全局状态 ---
const State = {
    running: false, paused: false, time: 0, frames: 0,
    level: 1, kills: 0, xp: 0, xpReq: 100,
    baseHp: 1000, hp: 1000, baseAtk: 10, baseFireRate: 45,
    skills: { atkSpeed: 0, pierce: 0, explosion: 0, bounce: 0, split: 0, volley: 0, damage: 0, slow: 0, fireball: 0 },
    
    modSpeed: 1.0, modSpawn: 1.0, modMSpd: 1.0, modMhp: 1.0,

    reset() {
        this.level = 1; this.kills = 0; this.xp = 0; this.xpReq = 100;
        this.hp = this.baseHp; this.time = 0; this.frames = 0;
        for(let k in this.skills) this.skills[k] = 0;
        Engine.entities = { enemies: [], projectiles: [], particles: [], texts: [] };
        UI.updateHUD(); UI.updateSkillPanel();
    }
};

class Particle {
    constructor(x, y, color, size, life, vx, vy) {
        this.x = x; this.y = y; this.color = color;
        this.size = size; this.life = life; this.maxLife = life;
        this.vx = vx; this.vy = vy;
    }
    update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.life -= dt; }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class FloatingText {
    constructor(x, y, text, color, isCrit) {
        this.x = x; this.y = y; this.text = text; this.color = color;
        this.life = 40; this.maxLife = 40; this.vy = -1.5; this.size = isCrit ? 18 : 12;
    }
    update(dt) { this.y += this.vy * dt; this.life -= dt; }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = '#0f172a'; // 统一使用深色文字以适配白色背景
        ctx.font = `bold ${this.size}px monospace`;
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1.0;
    }
}

class Enemy {
    constructor(type) {
        this.type = type; 
        this.r = type === 0 ? 14 : (type === 1 ? 20 : 34);
        this.x = MathUtil.rand(this.r, C.W - this.r); this.y = -this.r - 20;
        
        let baseHp = [20, 100, 1000][type];
        let baseSpd = [1.5, 1.1, 0.7][type];
        
        this.maxHp = baseHp * Math.pow(1.22, State.level) * State.modMhp;
        this.hp = this.maxHp;
        this.baseSpeed = baseSpd;
        this.speed = this.baseSpeed;
        
        this.color = ['#64748b', '#0f172a', '#000000'][type]; // 单色水墨风格配色
        this.xpVal = [10, 50, 500][type]; this.dmgToPlayer = [50, 150, 500][type];
        
        this.slowTimer = 0; this.vulnerable = 0; this.marked = false;
        this.kbx = 0; this.kby = 0;
    }

    applyEffect(type, params) {
        if (type === 'slow') { this.speed = this.baseSpeed * (1 - params.ratio); this.slowTimer = params.duration; this.vulnerable = params.vuln || 0; }
        else if (type === 'knockback') { this.kbx = params.vx * 3.5; this.kby = params.vy * 3.5; }
    }

    update(dt) {
        if (this.slowTimer > 0) {
            this.slowTimer -= dt;
            if (this.slowTimer <= 0) { this.speed = this.baseSpeed; this.vulnerable = 0; }
        }
        this.x += this.kbx * dt; this.y += this.kby * dt;
        this.kbx *= 0.82; this.kby *= 0.82;
        
        this.y += this.speed * dt * State.modMSpd;
        this.x = Math.max(this.r, Math.min(C.W - this.r, this.x));
    }

    takeDamage(amount, sourceProj) {
        let finalDmg = amount * (1 + this.vulnerable);
        if (State.skills.damage >= 2 && this.type === 1) finalDmg *= 1.1;
        if (State.skills.damage >= 3 && this.type === 1) finalDmg *= 1.2;
        if (State.skills.damage >= 3 && this.type === 2) finalDmg *= 1.3;

        this.hp -= finalDmg;
        Engine.addText(this.x, this.y - this.r, Math.floor(finalDmg), '#000000', finalDmg > amount * 1.15);
        
        if (this.hp <= 0) {
            Engine.createExplosion(this.x, this.y, '#94a3b8', 10); Engine.gainXP(this.xpVal); State.kills++; return true;
        }
        return false;
    }

    draw(ctx) {
        let img = AssetEngine.images['enemy' + this.type];
        
        if (img) {
            let size = this.r * 2.2;
            if (this.slowTimer > 0) {
                ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r+1, 0, Math.PI*2); ctx.stroke();
            }
            ctx.drawImage(img, this.x - size/2, this.y - size/2, size, size);
        } else {
            // 水墨描边线稿风格
            ctx.fillStyle = this.slowTimer > 0 ? '#e0f2fe' : '#ffffff';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = this.color; ctx.lineWidth = 3; ctx.stroke();
            
            // 简易内环丰富质感
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r * 0.4, 0, Math.PI*2); ctx.stroke();
        }
        
        if(this.marked) {
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.5; ctx.setLineDash([3, 3]);
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r+4, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
        }

        if (this.hp < this.maxHp || this.type > 0) {
            let hpRatio = Math.max(0, this.hp / this.maxHp);
            ctx.fillStyle = '#cbd5e1'; ctx.fillRect(this.x - 16, this.y - this.r - 8, 32, 4);
            ctx.fillStyle = '#0f172a'; ctx.fillRect(this.x - 16, this.y - this.r - 8, 32 * hpRatio, 4);
        }
    }
}

class Projectile {
    constructor(x, y, angle, type, configOverrides = {}) {
        this.x = x; this.y = y; this.type = type; 
        
        let bDmg = State.baseAtk;
        if(type === 'arcane') bDmg *= (1 + State.skills.damage * 0.2);
        
        this.damage = configOverrides.damage || bDmg;
        this.speed = type === 'arcane' ? 8.5 : 5.0; // 提升直射弹道速度
        this.r = type === 'arcane' ? 4 : (8 + State.skills.fireball * 2.0);
        this.color = type === 'arcane' ? '#0f172a' : '#e11d48'; // 契合黑白色调
        
        this.vx = Math.cos(angle) * this.speed; this.vy = Math.sin(angle) * this.speed;
        this.life = 300; 
        
        if(type === 'arcane') {
            let pLv = State.skills.textPierce; this.pierceLeft = configOverrides.pierceLeft ?? (pLv === 3 ? 999 : pLv);
            let bLv = State.skills.bounce; this.bounceLeft = configOverrides.bounceLeft ?? bLv;
            this.bounceDmgMult = [1, 0.7, 0.8, 1.0][bLv];
            this.canSplit = configOverrides.canSplit ?? true;
            this.hitSet = new Set();
        }
    }

    update(dt) {
        // [已移除物理跟踪 Homing 效果，改为流畅的纯直向抛射运动]
        this.x += this.vx * dt; this.y += this.vy * dt; this.life -= dt;
        
        if(this.type === 'arcane' && this.bounceLeft > 0) {
            let hitEdge = false;
            if(this.x < 0 || this.x > C.W) { this.vx *= -1; this.x = Math.max(0, Math.min(C.W, this.x)); hitEdge = true; }
            if(this.y < 0) { this.vy *= -1; this.y = 0; hitEdge = true; }
            
            if(hitEdge) {
                this.bounceLeft--; this.damage *= this.bounceDmgMult; this.hitSet.clear(); 
                let target = null; let bLv = State.skills.bounce;
                if(bLv >= 2) target = Engine.entities.enemies.reduce((prev, curr) => (prev.hp < curr.hp) ? prev : curr, Engine.entities.enemies[0]);
                else target = Engine.getNearestEnemy(this.x, this.y);
                
                if(target) {
                    let dir = MathUtil.normalize(target.x - this.x, target.y - this.y);
                    this.vx = dir.x * this.speed; this.vy = dir.y * this.speed;
                }
            }
        }
    }

    draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
        
        // 极简风虚化拖尾
        ctx.globalAlpha = 0.25;
        ctx.beginPath(); ctx.arc(this.x - this.vx * 0.6, this.y - this.vy * 0.6, this.r * 0.8, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;
    }

    onHit(enemy) {
        if(this.type === 'arcane') {
            if(this.hitSet.has(enemy)) return false; 
            this.hitSet.add(enemy);
            enemy.takeDamage(this.damage, this);

            let sLv = State.skills.slow;
            if(sLv > 0) {
                let ratio = [0, 0.2, 0.35, 0.5][sLv]; let dur = [0, 60, 120, 180][sLv]; let vuln = sLv === 3 ? 0.15 : 0;
                enemy.applyEffect('slow', {ratio, duration: dur, vuln});
            }

            let spLv = State.skills.split;
            if(this.canSplit && spLv > 0) {
                let dmgRatio = [0, 0.3, 0.5, 0.7][spLv];
                for(let i=0; i<spLv; i++) {
                    Engine.entities.projectiles.push(new Projectile(this.x, this.y, Math.random() * Math.PI * 2, 'arcane', {
                        damage: this.damage * dmgRatio, canSplit: false, pierceLeft: spLv === 3 ? this.pierceLeft : 0, bounceLeft: 0
                    }));
                }
            }
            if(this.pierceLeft > 0) { this.pierceLeft--; return false; } 
            else { this.triggerDestroy(); return true; }
        } else if (this.type === 'fireball') {
            enemy.takeDamage(this.damage, this); this.triggerDestroy(); return true;
        }
        return true;
    }

    triggerDestroy() {
        if(this.type === 'arcane') {
            let exLv = State.skills.explosion;
            if(exLv > 0) {
                let radius = [0, 30, 60, 90][exLv]; let exDmg = this.damage * [0, 0.5, 0.75, 1.0][exLv];
                Engine.createExplosion(this.x, this.y, '#64748b', 12);
                Engine.entities.enemies.forEach(e => {
                    if(MathUtil.dist(this, e) <= radius + e.r) {
                        e.takeDamage(exDmg, this);
                        if(exLv === 3) { let nDir = MathUtil.normalize(e.x - this.x, e.y - this.y); e.applyEffect('knockback', {vx: nDir.x, vy: nDir.y}); }
                    }
                });
            } else Engine.createExplosion(this.x, this.y, '#cbd5e1', 3);
        } else if (this.type === 'fireball') {
            let radius = 60 + State.skills.fireball * 20;
            Engine.createExplosion(this.x, this.y, '#f43f5e', 20);
            Engine.entities.enemies.forEach(e => { if(MathUtil.dist(this, e) <= radius + e.r) e.takeDamage(this.damage * 2.2, this); });
        }
    }
}

class Player {
    constructor() {
        this.x = C.W / 2; this.y = C.PLAYER_Y; this.r = C.PLAYER_RADIUS;
        this.fireTimer = 0; this.fireballTimer = 0;
        this.shootY = this.y - this.r - 10;
    }
    
    update(dt) {
        this.fireTimer -= dt;
        if(this.fireTimer <= 0) {
            this.shootArcane();
            let vLv = State.skills.volley; let volleySpdMod = 1 - [0, 0.1, 0.2, 0.3][vLv];
            let aSpdLv = State.skills.atkSpeed; let atkSpdMod = 1 - [0, 0.2, 0.4, 0.6][aSpdLv]; 
            this.fireTimer = State.baseFireRate * volleySpdMod * atkSpdMod;
        }

        if(State.skills.fireball > 0) {
            this.fireballTimer -= dt;
            if(this.fireballTimer <= 0) {
                this.shootFireball(); this.fireballTimer = 200 - State.skills.fireball * 40; 
            }
        }
    }

    shootArcane() {
        let vLv = State.skills.volley; let count = 1 + vLv; let baseAngle = -Math.PI / 2;
        let target = Engine.getNearestEnemy(this.x, this.shootY);
        if(target) { let dx = target.x - this.x; let dy = target.y - this.shootY; baseAngle = Math.atan2(dy, dx); }
        let spread = vLv === 3 ? 0.35 : 0.12 * vLv; 

        for(let i=0; i<count; i++) {
            let angle = count === 1 ? baseAngle : baseAngle - spread/2 + (spread/(count-1)) * i;
            Engine.entities.projectiles.push(new Projectile(this.x, this.shootY, angle, 'arcane'));
        }
    }

    shootFireball() {
        let target = Engine.getNearestEnemy(this.x, this.shootY); if(!target) return;
        let angle = Math.atan2(target.y - this.shootY, target.x - this.x);
        Engine.entities.projectiles.push(new Projectile(this.x, this.shootY, angle, 'fireball'));
    }

    draw(ctx) {
        if(AssetEngine.images.king) {
            let imgSize = this.r * 3.5;
            ctx.drawImage(AssetEngine.images.king, this.x - imgSize/2, this.y - imgSize/2, imgSize, imgSize);
            this.shootY = this.y - imgSize/2;
        } else {
            // 极简墨绘风线稿国王
            ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 3;
            ctx.fillStyle = '#ffffff';
            
            // 绘制防线基座
            ctx.fillRect(this.x - 20, this.y, 40, C.H - this.y);
            ctx.strokeRect(this.x - 20, this.y, 40, C.H - this.y);
            
            // 城堡顶
            ctx.beginPath();
            ctx.moveTo(this.x - 16, this.y); ctx.lineTo(this.x - 16, this.y - 14);
            ctx.lineTo(this.x - 8, this.y - 6); ctx.lineTo(this.x, this.y - 18);
            ctx.lineTo(this.x + 8, this.y - 6); ctx.lineTo(this.x + 16, this.y - 14);
            ctx.lineTo(this.x + 16, this.y); ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            // 法球核心
            ctx.beginPath(); ctx.arc(this.x, this.y + 6, this.r * 0.7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            this.shootY = this.y - 18; 
        }
    }
}

// --- 游戏物理引擎核心 ---
const Engine = {
    canvas: null, ctx: null, player: null, entities: { enemies: [], projectiles: [], particles: [], texts: [] }, spawnTimer: 0,

    init() {
        this.canvas = document.getElementById('gameCanvas'); this.ctx = this.canvas.getContext('2d');
        State.baseAtk = parseInt(document.getElementById('slider-atk').value);
        State.reset(); this.player = new Player();
        UI.initBindings();
        
        // 启动时初始化加载同目录默认本地图
        AssetEngine.initDefaults();
        
        requestAnimationFrame(t => this.loop(t));
    },

    getNearestEnemy(x, y) {
        let minDist = Infinity; let target = null;
        for(let e of this.entities.enemies) { let d = MathUtil.dist({x,y}, e); if(d < minDist) { minDist = d; target = e; } }
        return target;
    },

    createExplosion(x, y, color, count) {
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2; let speed = MathUtil.rand(1.2, 3.8);
            this.entities.particles.push(new Particle(x, y, color, MathUtil.rand(2, 4), MathUtil.rand(10, 30), Math.cos(angle)*speed, Math.sin(angle)*speed));
        }
    },
    
    addText(x, y, text, color, isCrit=false) { this.entities.texts.push(new FloatingText(x, y, text, color, isCrit)); },

    gainXP(val) {
        State.xp += val;
        if(State.xp >= State.xpReq) { State.xp -= State.xpReq; State.xpReq = Math.floor(State.xpReq * 1.45); UI.showLevelUp(); }
        UI.updateHUD();
    },

    spawnLogic(dt) {
        this.spawnTimer -= dt;
        if(this.spawnTimer <= 0) {
            let baseRate = Math.max(12, 110 - State.level * 3.5);  this.spawnTimer = baseRate / State.modSpawn;
            let roll = Math.random(); let type = 0;
            if(State.level % 5 === 0 && this.entities.enemies.filter(e=>e.type===2).length === 0) type = 2; 
            else if (roll < 0.12 + State.level * 0.015) type = 1; 
            this.entities.enemies.push(new Enemy(type));
        }
    },

    checkCollisions() {
        for(let i=this.entities.projectiles.length-1; i>=0; i--) {
            let p = this.entities.projectiles[i]; let hit = false;
            for(let j=0; j<this.entities.enemies.length; j++) {
                let e = this.entities.enemies[j];
                if(MathUtil.dist(p, e) < p.r + e.r) { if(p.onHit(e)) { hit = true; break; } }
            }
            if(hit || p.life <= 0 || p.y > C.H) { if(!hit && p.type === 'arcane') p.triggerDestroy(); this.entities.projectiles.splice(i, 1); }
        }

        for(let i=this.entities.enemies.length-1; i>=0; i--) {
            let e = this.entities.enemies[i];
            if(e.y + e.r > C.PLAYER_Y - 10) {
                State.hp -= e.dmgToPlayer; this.entities.enemies.splice(i, 1); UI.updateHUD();
                Engine.createExplosion(C.W/2, C.PLAYER_Y, '#ef4444', 25);
                if(State.hp <= 0) UI.gameOver(false);
            }
        }
    },

    update(dt) {
        if(!State.running || State.paused) return;
        let actualDt = dt * State.modSpeed; State.frames += actualDt; State.time = Math.floor(State.frames / 60);
        
        let newLevel = Math.floor(State.time / 30) + 1;
        if(newLevel > State.level) { State.level = newLevel; if(State.level > C.MAX_LEVEL) { UI.gameOver(true); return; } }

        this.spawnLogic(actualDt); this.player.update(actualDt);
        this.entities.enemies.forEach(e => e.update(actualDt));
        this.entities.projectiles.forEach(p => p.update(actualDt));
        this.entities.particles.forEach(p => p.update(actualDt));
        this.entities.texts.forEach(t => t.update(actualDt));

        this.checkCollisions();

        this.entities.enemies = this.entities.enemies.filter(e => e.hp > 0);
        this.entities.particles = this.entities.particles.filter(p => p.life > 0);
        this.entities.texts = this.entities.texts.filter(t => t.life > 0);
        UI.updateHUD();
    },

    draw() {
        this.ctx.fillStyle = '#ffffff'; this.ctx.fillRect(0, 0, C.W, C.H);
        
        // 简易横切实黑防线
        this.ctx.strokeStyle = '#0f172a'; this.ctx.lineWidth = 3;
        this.ctx.beginPath(); this.ctx.moveTo(0, C.PLAYER_Y - 10); this.ctx.lineTo(C.W, C.PLAYER_Y - 10); this.ctx.stroke();

        this.entities.particles.forEach(p => p.draw(this.ctx));
        this.entities.enemies.forEach(e => e.draw(this.ctx));
        this.entities.projectiles.forEach(p => p.draw(this.ctx));
        this.player.draw(this.ctx);
        this.entities.texts.forEach(t => t.draw(this.ctx));
    },

    loop(timestamp) { this.update(1); this.draw(); requestAnimationFrame(t => this.loop(t)); }
};

// --- UI 控制面板 ---
const UI = {
    initBindings() {
        const bindSlider = (id, prop, valId) => {
            document.getElementById(id).addEventListener('input', (e) => {
                let val = parseFloat(e.target.value);
                if(prop.startsWith('Asset')) { AssetEngine[prop.split('.')[1]] = val; } 
                else { State[prop] = val; }
                document.getElementById(valId).innerText = (prop==='baseAtk' || prop.includes('chroma')) ? val : val.toFixed(1) + 'x';
            });
        };
        bindSlider('slider-speed', 'modSpeed', 'val-speed');
        bindSlider('slider-spawn', 'modSpawn', 'val-spawn');
        bindSlider('slider-mspeed', 'modMSpd', 'val-mspeed');
        bindSlider('slider-mhp', 'modMhp', 'val-mhp');
        bindSlider('slider-atk', 'baseAtk', 'val-atk');
        bindSlider('slider-chroma', 'AssetEngine.chromaThreshold', 'val-chroma');

        document.getElementById('btn-start').onclick = () => { State.running = true; State.paused = false; document.getElementById('message-layer').style.opacity = 0; };
        document.getElementById('btn-pause').onclick = () => { State.paused = !State.paused; };
        document.getElementById('btn-reset').onclick = () => { State.reset(); State.running = true; document.getElementById('message-layer').style.opacity = 0;};
    },

    getSkillIconHtml(skill) {
        let customImg = AssetEngine.images[skill.category];
        if (customImg) return `<img src="${customImg.src}" alt="${skill.name}">`;
        return skill.icon;
    },

    updateHUD() {
        document.getElementById('exp-bar').style.width = `${Math.min(100, (State.xp / State.xpReq) * 100)}%`;
        document.getElementById('hp-bar').style.width = `${Math.max(0, (State.hp / State.baseHp) * 100)}%`;
        document.getElementById('level-text').innerText = `第 ${State.level} 关`;
        document.getElementById('score-text').innerText = `击杀: ${State.kills}`;
        let m = Math.floor(State.time / 60).toString().padStart(2, '0'); let s = (State.time % 60).toString().padStart(2, '0');
        document.getElementById('time-text').innerText = `${m}:${s}`;
    },

    updateSkillPanel() {
        let html = '';
        for(let key in State.skills) {
            let lv = State.skills[key];
            if(lv > 0) html += `<span class="skill-badge">${this.getSkillIconHtml(SKILL_DB[key])} ${SKILL_DB[key].name} Lv.${lv}</span>`;
        }
        document.getElementById('skill-status').innerHTML = html || '暂未解锁任何技能树词条...';
    },

    showLevelUp() {
        State.paused = true;
        const modal = document.getElementById('modal-overlay'); const container = document.getElementById('level-up-modal');
        container.innerHTML = '';
        
        let pool = Object.keys(SKILL_DB).filter(k => State.skills[k] < SKILL_DB[k].maxLv);
        if(pool.length === 0) { State.hp = Math.min(State.baseHp, State.hp + 200); State.paused = false; return; }

        pool.sort(() => Math.random() - 0.5); let choices = pool.slice(0, Math.min(3, pool.length));

        choices.forEach(key => {
            let skill = SKILL_DB[key]; let nextLv = State.skills[key] + 1; let desc = skill.descs[nextLv - 1];
            let card = document.createElement('div'); card.className = 'skill-card';
            card.innerHTML = `
                <div class="skill-icon">${this.getSkillIconHtml(skill)}</div>
                <div class="skill-info">
                    <div class="skill-name">${skill.name}</div>
                    <div class="skill-desc">${desc}</div>
                </div>
                <div class="skill-lv">Lv.${nextLv}</div>
            `;
            card.onclick = () => { State.skills[key]++; this.updateSkillPanel(); modal.style.display = 'none'; State.paused = false; };
            container.appendChild(card);
        });
        modal.style.display = 'flex';
    },

    gameOver(isWin) {
        State.running = false; const msg = document.getElementById('message-layer');
        msg.innerText = isWin ? "🎉 守护神迹！完美通关！" : "💀 城堡陷落，国王阵亡！";
        msg.style.color = '#000000'; msg.style.opacity = 1;
    }
};

window.onload = () => { Engine.init(); };
</script>
